"$schema" = 'https://starship.rs/config-schema.json'
scan_timeout = 10
command_timeout = 300
follow_symlinks = false

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_state\
$git_status\
$rust\
$golang\
$fill\
$cmd_duration\
$line_break\
$python\
$character"""
#
# Sets user-defined palette
# Palettes must be defined _after_ this line
palette = "catppuccin_mocha"

[palettes.catppuccin_mocha]
rosewater = "#f5e0dc"
flamingo = "#f2cdcd"
pink = "#f5c2e7"
mauve = "#cba6f7"
red = "#f38ba8"
maroon = "#eba0ac"
peach = "#fab387"
yellow = "#f9e2af"
green = "#a6e3a1"
teal = "#94e2d5"
sky = "#89dceb"
sapphire = "#74c7ec"
blue = "#89b4fa"
lavender = "#b4befe"
text = "#cdd6f4"
subtext1 = "#bac2de"
subtext0 = "#a6adc8"
overlay2 = "#9399b2"
overlay1 = "#7f849c"
overlay0 = "#6c7086"
surface2 = "#585b70"
surface1 = "#45475a"
surface0 = "#313244"
base = "#1e1e2e"
mantle = "#181825"
crust = "#11111b"

# Starship modules
[character]
# Note the use of Catppuccin color 'peach'
success_symbol = "[\\$](bold green)"
error_symbol = "[\\$](bold red)"
vimcmd_symbol = "[ÔØ«](subtext1)" # For use with zsh-vi-mode

[directory]
format = "[ $path]($style)[$read_only]($read_only_style) "
# style = "blue"
style = "bold sapphire"
read_only = " ¾░î¥"
truncation_length = 4

[git_branch]
format = "[$symbol$branch]($style)"
style = "bold mauve"
symbol = "´Éİ "

[git_status]
format = "[[(*$conflicted$untracked$modified$staged$renamed$deleted)](218) ($ahead_behind$stashed)]($style)"
style = "cyan"
conflicted = "ÔÇï"
untracked = "ÔÇï"
modified = "ÔÇï"
staged = "ÔÇï"
renamed = "ÔÇï"
deleted = "ÔÇï"
stashed = "Ôëí"
use_git_executable = true
ignore_submodules = true

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\) '
style = "bright-black"

[fill]
symbol = " "

[cmd_duration]
format = "[$duration]($style) "
style = "subtext1"

[python]
format = "[$virtualenv]($style) "
style = "bright-black"
detect_extensions = []
detect_files = []
